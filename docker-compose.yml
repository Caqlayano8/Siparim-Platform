version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: siparim_postgres
    environment:
      POSTGRES_DB: siparim_db
      POSTGRES_USER: siparim
      POSTGRES_PASSWORD: siparim123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: siparim_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: siparim_backend
    env_file: ./backend/.env
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

volumes:
  postgres_data:
